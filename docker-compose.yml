# Pull-and-run only — no `build:` block.
# Build happens on the dev box (`make release`) and is pushed to ghcr.io.
# This file is safe to paste into Portainer's web editor.
#
# Per-VM settings live in `.env`:
#   - VM B (Gotify host): MQTT_HOST=<FRIGATE_HOST>,  GOTIFY_URL=http://gotify
#     network = the *_default network the Gotify stack created
#   - VM A (Frigate host): MQTT_HOST=mosquitto,      GOTIFY_URL=http://<GOTIFY_HOST>:<port>
#     network = whatever shares with Mosquitto
services:
  bridge:
    image: ghcr.io/artur-matkowski/frigate-gotify-bridge:latest
    container_name: frigate-gotify-bridge
    restart: unless-stopped
    env_file: .env
    networks:
      - gotify_default

networks:
  gotify_default:
    external: true
